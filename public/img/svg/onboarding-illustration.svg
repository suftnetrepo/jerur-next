    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
    <circle cx="34" cy="-30" r="17" fill="#eef1fa" stroke="#6b7fc9" stroke-width="1.5"/>
    <rect x="24" y="-40" width="20" height="14" rx="2" fill="none" stroke="#6b7fc9" stroke-width="1.5"/>
    <line x1="24" y1="-35" x2="44" y2="-35" stroke="#6b7fc9" stroke-width="1.5"/>
    <line x1="28" y1="-29" x2="40" y2="-29" stroke="#6b7fc9" stroke-width="1.2"/>
  </g>

